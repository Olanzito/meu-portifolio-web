<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escola Virtual</title>
</head>
<body>

    <h1>Escola Virtual</h1>
    <h2>Formulario de Pré-Matricula</h2>

    <div>
        <fieldset>
                <h3>Dados pessoas</h3>
                <label for="Fnome">Nome do aluno</label> <br>
                    <input type="text" id="Fnome" name="fnome" placeholder="Digite o nome do aluno"> <br>

                <label for="fNascimento">Nascimento (dd/mm/aa)</label>
                    <input type="date" id="fNascimento" name= "fNascimento"> <br>

                <label for="fMae">Nome da mãe</label>
                    <input type="text" id=" fMae" name="fMae" placeholder="Digite o nome da mãe"> <br>

                <label for="fPai">Nome do pai</label>
                    <input type="text" id=" fPai" name="fpai" placeholder="Digite o nome do pai"> <br>

                <label for="fTell">Telefone DDD</form>
                    <input type="text" name="fTell" id="fTell" placeholder="DDD"> 
                <label for="fTelle">Tel</form>
                    <input type="text" name="fTelle" id="fTelle" placeholder="Tel"> 
                <label for="fRamal">Ramal</form>
                    <input type="text" name="fRamal" id="fRamal" placeholder="Ramal"> <br>

                    <label for="fEmail">EMAIL</form>
                        <input type="text" name="fEmail" id="fEmail" placeholder="Email"> <br>

        </fieldset>

        <fieldset>
            <h3>Informações da matricula</h3>

            <label for="fSeries">Serie</label><br>
            <select name="opcoes" id="opcoes">
                <option value="opicoes">Pré-escolar</option>
                <option value="opicoes">opição 1</option>
            </select> <br>

            <td>
                <label>Turno:</label><br>
                <input type="radio" name="turno" value="1">
                <label for="manha">Manhã</label><br>
                <input type="radio" name="turno" value="2">
                <label for="tarde">Tarde</label> <br>
              </td>
              <td>
                <label>Atividades Extracurriculares</label><br>
                <input type="checkbox" name="fInfo" id="fInfo">
                <label for="fInfo">Informatica</label><br>
                <input type="checkbox" name="fMus" id="fMus">
                <label for="fMus">Música</label><br>
                <input type="checkbox" name="fBal" id="fBal">
                <label for="fBal">Balet</label><br>
                <input type="checkbox" name="fPi" id="fPi">
                <label for="fPi">Pintura</label><br>
                <input type="checkbox" name="fJudo" id="fJudo">
                <label for="fJudo">Judo</label><br>
                <input type="checkbox" name="fFutebol" id="fFutebol">
                <label for="fFutebol">Futebol</label>
              </td>
            </tr>
          </table>
        </fieldset>
        <button type="submit">Enviar Formulário</button>
        <button type="reset">Limpar Campos</button>
  
      </form>
    </div>
  
  
  
  </body>
  
  </html>

<body>
<h1>Listas</h1>

<div>
    <ol>Lista Ordenada

    <li>Café</li>
    <li>Chá</li>
    <li>Coca Cola</li>

    </ol>
</div>
<div>
    <ol type="I">Lista Ordeanda 2

    <li>Café</li>
    <li>Chá</li>
    <li>Coca Cola</li>

</ol>
</div>
<div>
    <ul type="circle">lista não Ordenada

    <li>Café</li>
    <li>Chá</li>
    <li>Coca Cola</li>

</ul>
</div>
<ul type="content">lista não Ordenada 2

<li>Café</li>
<li>Chá</li>
<li>Coca Cola</li>

</ul>

</body>
